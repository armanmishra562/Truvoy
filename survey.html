		<style>
			/* ── 1. CSS VARIABLES & RESET ────────────────────────────────────── */
			:root {
				/* Backgrounds */
				--color-bg-primary: #f6f2ee; /* warm cream/beige matching index page background */
				--color-bg-secondary: #e4e2df; /* warm grey matching stylesheet */
				--color-bg-card: #ffffff; /* white card background */
				--color-warm-white: #ffffff; /* white */

				/* Teal/Green — primary brand color */
				--color-green-dark: #2d464c; /* deep teal-green */
				--color-green-mid: #3d5e66; /* slightly lighter teal-green */
				--color-green-light: #5b7e87; /* lighter teal-green */

				/* Text */
				--color-text-primary: #2e4449; /* deep text color matching index page */
				--color-text-secondary: #5a6d72; /* muted text color */
				--color-text-muted: #8ba2a8; /* soft placeholder text color */

				/* Warm Accents */
				--color-sand: #e6bfae; /* pink-sand matching index page accent */
				--color-sand-light: #f0dbd3; /* lighter shade of pink-sand for soft borders */
				--color-error: #a34839; /* warm brick red for validation errors */
				--color-error-bg: #faf3f2;

				/* Interactive */
				--color-cta-bg: #2d464c; /* matching deep teal-green */
				--color-cta-text: #f6f2ee; /* matching background color */
				--color-cta-hover: #3d5e66; /* matching mid green-teal */
				--color-active: #e6bfae; /* selected radio/checkbox option pill accent */
				--color-progress: #2d464c; /* progress bar fill */
				--color-focus-ring: rgba(45, 70, 76, 0.25);

				/* Shadows */
				--shadow-card: 0 4px 20px rgba(45, 70, 76, 0.05);
				--shadow-hover: 0 12px 32px rgba(45, 70, 76, 0.1);

				/* Fonts */
				--font-display: 'Playfair Display', Georgia, serif;
				--font-body: 'Work Sans', sans-serif;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				background: linear-gradient(160deg, var(--color-bg-primary) 0%, var(--color-bg-secondary) 100%);
				font-family: var(--font-body);
				color: var(--color-text-primary);
				min-height: 100vh;
				line-height: 1.6;
				-webkit-font-smoothing: antialiased;
			}

			/* ── 2. LAYOUT & CONTAINER STRUCTURE ──────────────────────────────── */
			#app {
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				width: 100%;
			}

			.landing-container {
				max-width: 1100px;
				width: 100%;
				padding: 60px 24px;
				text-align: center;
				margin: 0 auto;
			}

			.survey-wrapper {
				width: 100%;
				max-width: 800px;
				margin: 0 auto;
				padding: 40px 24px;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
			}

			/* ── 3. LANDING SCREEN ────────────────────────────────────────────── */
			.landing-header {
				margin-bottom: 60px;
			}

			.landing-logo {
				font-family: var(--font-display);
				font-size: 2.2rem;
				font-style: italic;
				font-weight: 600;
				color: var(--color-green-dark);
				margin-bottom: 16px;
				letter-spacing: -0.01em;
			}

			.landing-title {
				font-family: var(--font-display);
				font-size: clamp(2.5rem, 5vw, 4rem);
				font-weight: 500;
				line-height: 1.1;
				color: var(--color-green-dark);
				margin-bottom: 24px;
			}

			.landing-subtitle {
				font-size: clamp(1rem, 2vw, 1.2rem);
				color: var(--color-text-secondary);
				max-width: 600px;
				margin: 0 auto;
				font-weight: 300;
			}

			.grid-cards {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
				gap: 24px;
				margin-top: 40px;
			}

			.card-link {
				text-decoration: none;
				color: inherit;
			}

			.survey-card {
				background: var(--color-bg-card);
				border: 1px solid var(--color-sand-light);
				border-radius: 16px;
				padding: 40px 30px;
				text-align: left;
				box-shadow: var(--shadow-card);
				transition: all 400ms cubic-bezier(0.16, 1, 0.3, 1);
				height: 100%;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				cursor: pointer;
			}

			.survey-card:hover {
				transform: translateY(-8px);
				box-shadow: var(--shadow-hover);
				border-color: var(--color-sand);
			}

			.card-icon {
				width: 48px;
				height: 48px;
				border-radius: 50%;
				background: var(--color-bg-secondary);
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--color-green-dark);
				margin-bottom: 24px;
				font-size: 1.4rem;
				transition: background 300ms ease;
			}

			.survey-card:hover .card-icon {
				background: var(--color-green-dark);
				color: var(--color-cta-text);
			}

			.card-title {
				font-family: var(--font-display);
				font-size: 1.8rem;
				font-style: italic;
				font-weight: 500;
				color: var(--color-green-dark);
				margin-bottom: 12px;
			}

			.card-desc {
				font-size: 0.95rem;
				color: var(--color-text-secondary);
				font-weight: 300;
				line-height: 1.5;
				margin-bottom: 30px;
				flex-grow: 1;
			}

			.card-action {
				display: inline-flex;
				align-items: center;
				font-weight: 500;
				font-size: 0.9rem;
				color: var(--color-green-dark);
				letter-spacing: 0.05em;
				text-transform: uppercase;
				gap: 8px;
			}

			.card-action svg {
				transition: transform 300ms ease;
			}

			.survey-card:hover .card-action svg {
				transform: translateX(6px);
			}

			/* ── 4. SURVEY CONTAINER & HEADER ─────────────────────────────────── */
			.survey-header {
				margin-bottom: 32px;
				width: 100%;
			}

			.brand-bar {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-bottom: 24px;
				width: 100%;
			}

			.logo-link {
				font-family: var(--font-display);
				font-size: 1.6rem;
				font-style: italic;
				font-weight: 600;
				color: var(--color-green-dark);
				text-decoration: none;
			}

			.survey-name {
				font-size: 0.9rem;
				font-weight: 500;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				color: var(--color-text-secondary);
				background: var(--color-bg-secondary);
				padding: 6px 14px;
				border-radius: 100px;
			}

			.category-stepper {
				display: flex;
				justify-content: space-between;
				align-items: baseline;
				margin-bottom: 10px;
				flex-wrap: wrap;
				gap: 8px;
			}

			.section-title {
				font-family: var(--font-display);
				font-style: italic;
				font-weight: 500;
				font-size: clamp(1.8rem, 4vw, 2.4rem);
				color: var(--color-green-dark);
				line-height: 1.2;
			}

			.step-indicator {
				font-size: 0.85rem;
				font-weight: 600;
				color: var(--color-text-secondary);
				text-transform: uppercase;
				letter-spacing: 0.05em;
			}

			/* ── 5. PROGRESS BAR ──────────────────────────────────────────────── */
			.progress-track {
				background: var(--color-sand-light);
				border-radius: 100px;
				height: 6px;
				width: 100%;
				overflow: hidden;
				margin-bottom: 40px;
			}

			.progress-fill {
				background: linear-gradient(
					90deg,
					var(--color-green-dark),
					var(--color-green-light)
				);
				border-radius: 100px;
				height: 100%;
				width: 0%;
				transition: width 400ms ease;
			}

			/* ── 6. QUESTION CARD & CONTAINER ─────────────────────────────────── */
			.questions-container {
				display: flex;
				flex-direction: column;
				gap: 24px;
				width: 100%;
			}

			.question-card {
				background: var(--color-bg-card);
				border: 1px solid var(--color-sand-light);
				border-radius: 16px;
				padding: 30px;
				box-shadow: var(--shadow-card);
				width: 100%;
				transition:
					border-color 300ms,
					background-color 300ms;
				opacity: 0;
				transform: translateY(16px);
				animation: cardEnter 500ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
			}

			@keyframes cardEnter {
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			.question-card.error {
				border-color: var(--color-error);
				background-color: var(--color-error-bg);
			}

			.question-text {
				font-size: clamp(1rem, 2vw, 1.1rem);
				font-weight: 500;
				color: var(--color-text-primary);
				margin-bottom: 20px;
				display: block;
			}

			.question-text .required-star {
				color: var(--color-error);
				margin-left: 4px;
			}

			.error-message {
				color: var(--color-error);
				font-size: 0.85rem;
				margin-top: 10px;
				display: none;
				align-items: center;
				gap: 6px;
				font-weight: 500;
			}

			.question-card.error .error-message {
				display: flex;
			}

			/* ── 7. INPUT COMPONENTS ─────────────────────────────────────────── */

			/* Text inputs & Textarea */
			input[type='text'],
			textarea {
				width: 100%;
				background: var(--color-warm-white);
				border: 1.5px solid var(--color-sand-light);
				color: var(--color-text-primary);
				border-radius: 8px;
				padding: 14px 16px;
				font-family: var(--font-body);
				font-size: 0.95rem;
				transition:
					border-color 200ms,
					box-shadow 200ms;
			}

			input[type='text']:focus,
			textarea:focus {
				border-color: var(--color-green-light);
				box-shadow: 0 0 0 3.5px var(--color-focus-ring);
				outline: none;
			}

			textarea {
				min-height: 120px;
				resize: vertical;
			}

			/* Dropdown / Select */
			.select-wrapper {
				position: relative;
				width: 100%;
			}

			select {
				width: 100%;
				background: var(--color-warm-white);
				border: 1.5px solid var(--color-sand-light);
				color: var(--color-text-primary);
				border-radius: 8px;
				padding: 14px 16px;
				font-family: var(--font-body);
				font-size: 0.95rem;
				cursor: pointer;
				appearance: none;
				-webkit-appearance: none;
				transition:
					border-color 200ms,
					box-shadow 200ms;
			}

			select:focus {
				border-color: var(--color-green-light);
				box-shadow: 0 0 0 3.5px var(--color-focus-ring);
				outline: none;
			}

			.select-wrapper::after {
				content: '';
				position: absolute;
				right: 18px;
				top: 50%;
				transform: translateY(-50%);
				width: 10px;
				height: 6px;
				background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%231A2E22' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
				background-repeat: no-repeat;
				pointer-events: none;
			}

			/* Option Pills (Radio & Checkbox Group) */
			.pills-group {
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			.option-pill {
				background: var(--color-warm-white);
				border: 1.5px solid var(--color-sand-light);
				border-radius: 8px;
				color: var(--color-text-primary);
				cursor: pointer;
				padding: 14px 18px;
				font-size: 0.95rem;
				display: flex;
				align-items: center;
				gap: 12px;
				position: relative;
				transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
				user-select: none;
			}

			.option-pill:hover {
				border-color: var(--color-green-light);
				background: var(--color-bg-card);
				transform: scale(1.005);
			}

			.option-pill:focus-visible {
				outline: none;
				border-color: var(--color-green-light);
				box-shadow: 0 0 0 3.5px var(--color-focus-ring);
			}

			.pill-indicator {
				width: 18px;
				height: 18px;
				border: 2px solid var(--color-sand);
				transition: all 200ms ease;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
			}

			/* Radio indicator shape */
			.type-radio .pill-indicator {
				border-radius: 50%;
			}

			/* Checkbox indicator shape */
			.type-checkbox .pill-indicator {
				border-radius: 4px;
			}

			.option-pill.selected {
				background: var(--color-bg-secondary);
				border-color: var(--color-green-dark);
				font-weight: 500;
			}

			.option-pill.selected .pill-indicator {
				border-color: var(--color-green-dark);
				background: var(--color-green-dark);
			}

			.option-pill.selected .pill-indicator::after {
				content: '';
				display: block;
			}

			/* Dot for radio */
			.type-radio .option-pill.selected .pill-indicator::after {
				width: 6px;
				height: 6px;
				background: var(--color-cta-text);
				border-radius: 50%;
			}

			/* Checkmark for checkbox */
			.type-checkbox .option-pill.selected .pill-indicator::after {
				width: 8px;
				height: 5px;
				border-left: 2px solid var(--color-cta-text);
				border-bottom: 2px solid var(--color-cta-text);
				transform: rotate(-45deg) translate(1px, -1px);
			}

			/* Star rating */
			.star-rating-container {
				display: flex;
				align-items: center;
				gap: 16px;
			}

			.star-row {
				display: inline-flex;
				gap: 8px;
			}

			.star {
				font-size: 2.2rem;
				color: var(--color-sand-light);
				cursor: pointer;
				transition:
					transform 150ms ease,
					color 150ms ease;
				user-select: none;
			}

			.star:hover {
				transform: scale(1.15);
			}

			.star.hovered,
			.star.filled {
				color: var(--color-green-mid);
			}

			.star:focus-visible {
				outline: none;
				transform: scale(1.1);
			}

			.rating-label {
				font-size: 0.9rem;
				font-weight: 500;
				color: var(--color-text-secondary);
				min-width: 80px;
			}

			/* ── 8. BUTTONS & NAVIGATION FOOTER ───────────────────────────────── */
			.navigation-footer {
				display: flex;
				justify-content: space-between;
				align-items: center;
				margin-top: 40px;
				width: 100%;
				gap: 16px;
			}

			.btn {
				font-family: var(--font-body);
				font-weight: 500;
				font-size: 0.95rem;
				letter-spacing: 0.02em;
				cursor: pointer;
				transition: all 250ms cubic-bezier(0.16, 1, 0.3, 1);
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				min-height: 48px;
				padding: 12px 28px;
				border-radius: 100px;
				user-select: none;
			}

			.btn:focus-visible {
				outline: none;
				box-shadow: 0 0 0 3.5px var(--color-focus-ring);
			}

			.btn-primary {
				background: var(--color-cta-bg);
				color: var(--color-cta-text);
				border: none;
				box-shadow: 0 2px 8px rgba(31, 59, 47, 0.15);
			}

			.btn-primary:hover {
				background: var(--color-cta-hover);
				box-shadow: 0 4px 16px rgba(31, 59, 47, 0.25);
			}

			.btn-primary:active {
				transform: scale(0.97);
			}

			.btn-secondary {
				background: transparent;
				color: var(--color-green-dark);
				border: 1.5px solid var(--color-green-dark);
			}

			.btn-secondary:hover {
				background: var(--color-bg-secondary);
			}

			.btn-secondary:active {
				transform: scale(0.97);
			}

			.btn-back-home {
				background: transparent;
				color: var(--color-text-secondary);
				border: 1.5px solid var(--color-sand);
			}

			.btn-back-home:hover {
				background: var(--color-bg-secondary);
				border-color: var(--color-text-secondary);
			}

			/* ── 9. THANK-YOU SCREEN ─────────────────────────────────────────── */
			.thankyou-card {
				background: var(--color-bg-card);
				border: 1px solid var(--color-sand-light);
				border-radius: 24px;
				padding: 60px 40px;
				text-align: center;
				box-shadow: var(--shadow-card);
				max-width: 600px;
				width: 100%;
				opacity: 0;
				transform: scale(0.96);
				animation: thankyouEnter 600ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
			}

			@keyframes thankyouEnter {
				to {
					opacity: 1;
					transform: scale(1);
				}
			}

			.success-icon-wrapper {
				width: 80px;
				height: 80px;
				border-radius: 50%;
				background: var(--color-bg-secondary);
				display: flex;
				align-items: center;
				justify-content: center;
				color: var(--color-green-dark);
				margin: 0 auto 32px;
				font-size: 2.2rem;
			}

			.thankyou-title {
				font-family: var(--font-display);
				font-style: italic;
				font-weight: 500;
				font-size: 2.6rem;
				color: var(--color-green-dark);
				margin-bottom: 16px;
			}

			.thankyou-text {
				color: var(--color-text-secondary);
				font-size: 1.05rem;
				margin-bottom: 40px;
				font-weight: 300;
				line-height: 1.6;
			}

			/* ── 10. RESPONSIVE BREAKPOINTS & ADAPTIVE LAYOUT ────────────────── */

			/* Small mobiles */
			@media (max-width: 640px) {
				.survey-wrapper {
					padding: 24px 16px;
				}
				.question-card {
					padding: 20px;
				}
				.btn {
					flex-grow: 1;
					font-size: 0.9rem;
				}
				.navigation-footer {
					flex-direction: column-reverse;
				}
				.navigation-footer .btn {
					width: 100%;
				}
			}

			/* Tablet and Small Desktop default layout (Centered single column) */
			@media (min-width: 641px) and (max-width: 1440px) {
				.survey-wrapper {
					max-width: 680px;
				}
			}

			// Helper to auto-generate category sections from a flat list of questions
			function autoGenerateSections(flatQuestions) {
				const sectionsMap = {};
				const order = [];
				flatQuestions.forEach((q) => {
					const cat = q.category || 'General';
					if (!sectionsMap[cat]) {
						sectionsMap[cat] = [];
						order.push(cat);
					}
					sectionsMap[cat].push({
						q: q.q,
						type: q.type,
						options: q.options || [],
					});
				});
				return order.map((cat) => ({
					category: cat,
					questions: sectionsMap[cat],
				}));
			}

			// Helper to block emojis from text input and textarea fields
			function blockEmojis(element) {
				const emojiRegex = /\p{Extended_Pictographic}/gu;
				element.addEventListener('input', (e) => {
					const val = e.target.value;
					if (emojiRegex.test(val)) {
						const cleanVal = val.replace(emojiRegex, '');
						const start = e.target.selectionStart;
						e.target.value = cleanVal;
						const diff = val.length - cleanVal.length;
						e.target.setSelectionRange(start - diff, start - diff);
					}
				});
			}

			// ── 3. ROUTER ────────────────────────────────────────────────────
			function router() {
				const hash = window.location.hash.substring(1);

				if (['cafe', 'tour', 'tourist'].includes(hash)) {
					state.currentSurvey = hash;
					state.isSubmitted = false;

					// Restore answers from localStorage if any exist
					state.answers = loadAnswers(hash) || {};

					// Get last saved section index from local storage to resume
					const savedIndex = localStorage.getItem(
						`truvoy_survey_${hash}_index`,
					);
					state.currentSectionIndex = savedIndex ? parseInt(savedIndex, 10) : 0;

					renderSurvey(hash);
				} else {
					state.currentSurvey = null;
					state.isSubmitted = false;
					state.currentSectionIndex = 0;
					state.answers = {};
					renderLanding();
				}
			}

			// Render questions for a specific section index
			function renderSection(sectionIndex) {
				const type = state.currentSurvey;
				const data = SURVEYS[type];
				const section = data[sectionIndex];
				const totalSections = data.length;

				// Update Stepper and Header information
				const stepperContainer = document.querySelector(
					'.category-stepper-container',
				);
				const progressContainer = document.querySelector(
					'.progress-track-container',
				);

				const progressPercent = Math.round(
					(sectionIndex / totalSections) * 100,
				);

				stepperContainer.innerHTML = `
        <div class="category-stepper">
          <span class="step-indicator">Step ${sectionIndex + 1} of ${totalSections}</span>
        </div>
        <h2 class="section-title">${section.category}</h2>
      `;

				progressContainer.innerHTML = `
        <div class="progress-track">
          <div class="progress-fill" style="width: ${progressPercent || 2}%"></div>
        </div>
      `;

				// Render questions form
				const questionsForm = document.getElementById('questions-form');
				questionsForm.innerHTML = '';

				section.questions.forEach((q, idx) => {
					// Construct question card element
					const qCard = document.createElement('div');
					qCard.className = 'question-card';
					// Apply staggering animation delay offset
					qCard.style.animationDelay = `${idx * 80}ms`;
					qCard.id = `qc-${idx}`;

					// Add Question Text Label

					qText.innerHTML = `${q.q}<span class="required-star" aria-hidden="true">*</span>`;

					// Append error elements

            <path d="M7 4V7.5M7 10H7.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

					qCard.appendChild(errorMsg);

					questionsForm.appendChild(qCard);
				});

				// Render footer navigation buttons
				const footer = document.getElementById('navigation-footer');
				const isFirst = sectionIndex === 0;
				const isLast = sectionIndex === totalSections - 1;

				footer.innerHTML = `
        ${

						? `
          <button class="btn btn-secondary btn-back-home" onclick="navigateHome()">
            Cancel
          </button>
        `
						: `
          <button class="btn btn-secondary" onclick="prevSection()">
            <svg width="6" height="10" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg" style="transform: rotate(180deg)">
              <path d="M1 9L5 5L1 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Back
          </button>
        `
				}
        
        <button class="btn btn-primary" onclick="${isLast ? 'submitSurvey()' : 'nextSection()'}">
          ${isLast ? 'Submit Survey' : 'Save & Continue'}
          ${
						isLast
							? `
            <svg width="14" height="12" viewBox="0 0 14 12" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 6L5 10L13 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          `
							: `
            <svg width="6" height="10" viewBox="0 0 6 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 9L5 5L1 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          `
					}
        </button>

				// Robust scroll back to top of main area, window, and body to ensure top placement on all devices and browsers
				const mainContainer = document.querySelector('.survey-main');
				if (mainContainer) {
					mainContainer.scrollTo({ top: 0, behavior: 'smooth' });
				}
				window.scrollTo({ top: 0, behavior: 'smooth' });
				document.documentElement.scrollTo({ top: 0, behavior: 'smooth' });
				document.body.scrollTo({ top: 0, behavior: 'smooth' });

			// Render corresponding form input components based on Question data
			function renderQuestionInput(q, idx, category) {
				const container = document.createElement('div');
				container.className = 'input-container';

				// Create unique state keys using category and index
				const stateKey = `${category}__${q.q}`;
				const savedVal = state.answers[stateKey];

				if (q.type === 'text') {
					const input = document.createElement('input');
					input.type = 'text';
					input.id = `q-input-${idx}`;
					input.value = savedVal || '';
					input.placeholder = 'Type your response here...';
					input.setAttribute('aria-required', 'true');
					blockEmojis(input);
					input.addEventListener('input', (e) => {
						state.answers[stateKey] = e.target.value;
						// Clear validation borders dynamically on edit
						if (e.target.value.trim()) {
							document.getElementById(`qc-${idx}`).classList.remove('error');
						}
					});
					container.appendChild(input);
				} else if (q.type === 'textarea') {
					const textarea = document.createElement('textarea');
					textarea.id = `q-input-${idx}`;
					textarea.value = savedVal || '';
					textarea.placeholder = 'Write your detailed feedback here...';
					textarea.setAttribute('aria-required', 'true');
					blockEmojis(textarea);
					textarea.addEventListener('input', (e) => {
						state.answers[stateKey] = e.target.value;
						if (e.target.value.trim()) {
							document.getElementById(`qc-${idx}`).classList.remove('error');
						}
					});
					container.appendChild(textarea);
				} else if (q.type === 'dropdown') {
					const wrapper = document.createElement('div');
					wrapper.className = 'select-wrapper';

					const select = document.createElement('select');
					select.id = `q-input-${idx}`;
					select.setAttribute('aria-required', 'true');

					const placeholderOpt = document.createElement('option');
					placeholderOpt.value = '';
					placeholderOpt.textContent = 'Select an option...';
					placeholderOpt.disabled = true;
					placeholderOpt.selected = !savedVal;
					select.appendChild(placeholderOpt);

					q.options.forEach((opt) => {
						const option = document.createElement('option');
						option.value = opt;
						option.textContent = opt;
						option.selected = savedVal === opt;
						select.appendChild(option);
					});

					select.addEventListener('change', (e) => {
						state.answers[stateKey] = e.target.value;
						if (e.target.value) {
							document.getElementById(`qc-${idx}`).classList.remove('error');
						}
					});

					wrapper.appendChild(select);
					container.appendChild(wrapper);
				} else if (q.type === 'rating') {
					const starContainer = document.createElement('div');
					starContainer.className = 'star-rating-container';
					starContainer.id = `q-input-${idx}`;

					const starRow = document.createElement('div');
					starRow.className = 'star-row';
					starRow.setAttribute('role', 'radiogroup');
					starRow.setAttribute('aria-label', q.q);

					const selectedRating = savedVal ? parseInt(savedVal, 10) : 0;

					for (let s = 1; s <= 5; s++) {
						const star = document.createElement('span');
						star.className = `star ${s <= selectedRating ? 'filled' : ''}`;
						star.innerHTML = '★';
						star.setAttribute('role', 'radio');
						star.setAttribute(
							'aria-checked',
							s === selectedRating ? 'true' : 'false',
						);
						star.setAttribute(
							'tabindex',
							s === selectedRating || (selectedRating === 0 && s === 1)
								? '0'
								: '-1',
						);
						star.setAttribute('data-value', s);

						// Hover effects
						star.addEventListener('mouseenter', () =>
							highlightStars(starRow, s),
						);
						star.addEventListener('mouseleave', () =>
							resetStars(starRow, state.answers[stateKey] || 0),
						);

						// Select click
						star.addEventListener('click', () => {
							state.answers[stateKey] = s;
							updateStarAria(starRow, s);
							document.getElementById(`qc-${idx}`).classList.remove('error');
						});

						// Keyboard navigate
						star.addEventListener('keydown', (e) => {
							if (e.key === ' ' || e.key === 'Enter') {
								e.preventDefault();
								state.answers[stateKey] = s;
								updateStarAria(starRow, s);
								star.focus();
								document.getElementById(`qc-${idx}`).classList.remove('error');
							}
						});

						starRow.appendChild(star);
					}

					const ratingLabel = document.createElement('span');
					ratingLabel.className = 'rating-label';
					ratingLabel.textContent = selectedRating
						? `${selectedRating} of 5`
						: 'Rate 1 to 5';

					starContainer.appendChild(starRow);
					starContainer.appendChild(ratingLabel);
					container.appendChild(starContainer);
				} else if (q.type === 'radio' || q.type === 'checkbox') {
					const pillsGroup = document.createElement('div');
					pillsGroup.className = `pills-group type-${q.type}`;
					pillsGroup.id = `q-input-${idx}`;
					pillsGroup.setAttribute(
						'role',
						q.type === 'radio' ? 'radiogroup' : 'group',
					);
					pillsGroup.setAttribute('aria-label', q.q);

					const isMulti = q.type === 'checkbox';

					// Helper functions for conditional other inputs
					const isOtherOption = (optStr) => {
						const o = optStr.trim().toLowerCase();
						if (o === 'other' || o === 'others' || o === 'other.') return true;
						if (o.startsWith('specify') || o.startsWith('feedback') || o.includes('___')) return true;
						if (o.startsWith('other.') || o.startsWith('other:') || o.startsWith('other,') || o.startsWith('others,')) return true;
						if (o.endsWith('specify') || o.endsWith('specify:')) return true;
						return false;
					};

					const getCleanPrefix = (optStr) => {
						return optStr.replace(/[_:\s\.]+$/, '').trim();
					};

					const isOptionSelected = (optStr, val) => {
						if (!val) return false;
						if (isMulti) {
							if (!Array.isArray(val)) return false;
							return val.some(v => v === optStr || (isOtherOption(optStr) && v.startsWith(getCleanPrefix(optStr) + ':')));
						}
						return val === optStr || (isOtherOption(optStr) && val.startsWith(getCleanPrefix(optStr) + ':'));
					};

					const getOtherText = (optStr, val) => {
						if (!val) return '';
						const prefix = getCleanPrefix(optStr) + ': ';
						if (isMulti) {
							if (!Array.isArray(val)) return '';
							const match = val.find(v => v.startsWith(prefix));
							return match ? match.substring(prefix.length) : '';
						}
						return val.startsWith(prefix) ? val.substring(prefix.length) : '';
					};

					// Container for custom text input if needed
					const otherInputContainer = document.createElement('div');
					otherInputContainer.className = 'other-input-container';
					otherInputContainer.style.marginTop = '12px';
					otherInputContainer.style.display = 'none';

					const otherInput = document.createElement('input');
					otherInput.type = 'text';
					otherInput.placeholder = 'Please specify...';
					otherInput.className = 'other-text-input';
					otherInput.style.width = '100%';
					blockEmojis(otherInput);
					otherInputContainer.appendChild(otherInput);

					// Initial setup for loaded values
					let currentSelection = savedVal || (isMulti ? [] : null);

					const updateOtherVisibility = () => {
						let showOther = false;
						let activeOtherOpt = null;

						q.options.forEach((opt) => {
							if (isOtherOption(opt)) {
								const isSel = isMulti
									? currentSelection.some(v => v === opt || v.startsWith(getCleanPrefix(opt) + ':'))
									: (currentSelection === opt || (currentSelection && currentSelection.startsWith(getCleanPrefix(opt) + ':')));
								if (isSel) {
									showOther = true;
									activeOtherOpt = opt;
								}
							}
						});

						if (showOther && activeOtherOpt) {
							otherInputContainer.style.display = 'block';
							otherInput.placeholder = activeOtherOpt.toLowerCase().includes('feedback') ? 'Provide your feedback here...' : 'Please specify...';
							otherInput.value = getOtherText(activeOtherOpt, currentSelection);
						} else {
							otherInputContainer.style.display = 'none';
							otherInput.value = '';
						}
					};

					q.options.forEach((opt, oIdx) => {
						const pill = document.createElement('div');
						const isSelected = isOptionSelected(opt, currentSelection);

						pill.className = `option-pill ${isSelected ? 'selected' : ''}`;
						pill.setAttribute('role', isMulti ? 'checkbox' : 'radio');
						pill.setAttribute('aria-checked', isSelected ? 'true' : 'false');
						pill.setAttribute('tabindex', '0');

						pill.innerHTML = `
							<div class="pill-indicator"></div>
							<span>${opt}</span>
						`;

						const handleSelection = () => {
							if (isMulti) {
								const cleanPrefix = getCleanPrefix(opt);
								const existingIndex = currentSelection.findIndex(v => v === opt || v.startsWith(cleanPrefix + ':'));

								if (existingIndex > -1) {
									currentSelection.splice(existingIndex, 1);
									pill.classList.remove('selected');
									pill.setAttribute('aria-checked', 'false');
								} else {
									let valToPush = opt;
									if (isOtherOption(opt) && otherInput.value.trim()) {
										valToPush = cleanPrefix + ': ' + otherInput.value.trim();
									}
									currentSelection.push(valToPush);
									pill.classList.add('selected');
									pill.setAttribute('aria-checked', 'true');
								}
								state.answers[stateKey] = currentSelection;
							} else {
								// Deselect other radio pills
								pillsGroup.querySelectorAll('.option-pill').forEach((el) => {
									el.classList.remove('selected');
									el.setAttribute('aria-checked', 'false');
								});

								let valToSet = opt;
								if (isOtherOption(opt) && otherInput.value.trim()) {
									valToSet = getCleanPrefix(opt) + ': ' + otherInput.value.trim();
								}
								currentSelection = valToSet;
								pill.classList.add('selected');
								pill.setAttribute('aria-checked', 'true');
								state.answers[stateKey] = valToSet;
							}

							updateOtherVisibility();

							// Check if there are answers to remove validation error styling
							const hasResponse = isMulti
								? currentSelection.length > 0
								: !!currentSelection;
							if (hasResponse) {
								document.getElementById(`qc-${idx}`).classList.remove('error');
							}
						};

						pill.addEventListener('click', handleSelection);

						pill.addEventListener('keydown', (e) => {
							if (e.key === ' ' || e.key === 'Enter') {
								e.preventDefault();
								handleSelection();
							}
						});

						pillsGroup.appendChild(pill);
					});

					// Listen to text updates in specify input box
					otherInput.addEventListener('input', (e) => {
						const textVal = e.target.value.trim();
						let activeOtherOpt = q.options.find(isOtherOption);
						if (!activeOtherOpt) return;

						const cleanPrefix = getCleanPrefix(activeOtherOpt);
						const formattedVal = textVal ? (cleanPrefix + ': ' + textVal) : activeOtherOpt;

						if (isMulti) {
							// Find existing other option in array and update it
							const existingIndex = currentSelection.findIndex(v => v === activeOtherOpt || v.startsWith(cleanPrefix + ':'));
							if (existingIndex > -1) {
								currentSelection[existingIndex] = formattedVal;
							} else {
								currentSelection.push(formattedVal);
							}
							state.answers[stateKey] = currentSelection;
						} else {
							currentSelection = formattedVal;
							state.answers[stateKey] = formattedVal;
						}
					});

					container.appendChild(pillsGroup);
					container.appendChild(otherInputContainer);

					// Run initial visibility update on load
					updateOtherVisibility();
				}

				return container;
			}

			// Highlight stars on hover
			function highlightStars(starRow, count) {
				starRow.querySelectorAll('.star').forEach((star) => {
					const val = parseInt(star.getAttribute('data-value'), 10);
					if (val <= count) {
						star.classList.add('hovered');
					} else {
						star.classList.remove('hovered');
					}
				});
			}

			// Reset stars on hover out to currently saved value
			function resetStars(starRow, savedVal) {
				starRow.querySelectorAll('.star').forEach((star) => {
					star.classList.remove('hovered');
					const val = parseInt(star.getAttribute('data-value'), 10);
					if (val <= savedVal) {
						star.classList.add('filled');
					} else {
						star.classList.remove('filled');
					}
				});
			}

			// Update star active state on click
			function updateStarAria(starRow, value) {
				starRow.querySelectorAll('.star').forEach((star) => {
					const val = parseInt(star.getAttribute('data-value'), 10);
					star.classList.remove('hovered');
					if (val <= value) {
						star.classList.add('filled');
						star.setAttribute('aria-checked', 'true');
					} else {
						star.classList.remove('filled');
						star.setAttribute('aria-checked', 'false');
					}
					// Update tab index for focusability
					star.setAttribute('tabindex', val === value ? '0' : '-1');
				});
				const container = starRow.parentElement;
				const label = container.querySelector('.rating-label');
				label.textContent = `${value} of 5`;
			}

			// ── 5. NAVIGATION LOGIC & FLOW ────────────────────────────────────

			// Check validation of all questions in current category section
			function validateSection() {
				const type = state.currentSurvey;
				const data = SURVEYS[type];
				const section = data[state.currentSectionIndex];
				let firstErrorCard = null;
				let isValid = true;

				section.questions.forEach((q, idx) => {
					const stateKey = `${section.category}__${q.q}`;
					const val = state.answers[stateKey];
					let qValid = true;

					if (q.type === 'text' || q.type === 'textarea') {
						if (!val || val.trim() === '') qValid = false;
					} else if (q.type === 'dropdown') {
						if (!val) qValid = false;
					} else if (q.type === 'rating') {
						if (!val || val === 0) qValid = false;
					} else if (q.type === 'radio') {
						if (!val) qValid = false;
					} else if (q.type === 'checkbox') {
						if (!val || val.length === 0) qValid = false;
					}

					const qCard = document.getElementById(`qc-${idx}`);
					if (!qValid) {
						isValid = false;
						qCard.classList.add('error');
						if (!firstErrorCard) {
							firstErrorCard = qCard;
						}
					} else {
						qCard.classList.remove('error');
					}
				});

				if (firstErrorCard) {
					// Scroll smoothly to first invalid question
					firstErrorCard.scrollIntoView({
						behavior: 'smooth',
						block: 'center',
					});
					// Set focus to the input inside
					const input = firstErrorCard.querySelector(
						'input, textarea, select, .option-pill, .star',
					);
					if (input) input.focus();
				}

				return isValid;
			}

			// Navigate to next wizard section
			function nextSection() {
				if (!validateSection()) return;

				// Save current progress answers to localStorage
				saveAnswers(state.currentSurvey, state.answers);

				// Fade out section transition
				const mainContent =
					document.querySelector('.survey-main') ||
					document.querySelector('.survey-main-inline');
				mainContent.style.transition =
					'opacity 300ms ease-out, transform 300ms ease-out';
				mainContent.style.opacity = '0';
				mainContent.style.transform = 'translateY(16px)';

				setTimeout(() => {
					state.currentSectionIndex++;
					// Keep track of index position to allow user resuming
					localStorage.setItem(
						`truvoy_survey_${state.currentSurvey}_index`,
						state.currentSectionIndex,
					);

					renderSection(state.currentSectionIndex);

					mainContent.style.opacity = '1';
					mainContent.style.transform = 'translateY(0)';
				}, 300);
			}

			// Navigate back to previous wizard section
			function prevSection() {
				if (state.currentSectionIndex === 0) return;

				const mainContent =
					document.querySelector('.survey-main') ||
					document.querySelector('.survey-main-inline');
				mainContent.style.transition =
					'opacity 300ms ease-out, transform 300ms ease-out';
				mainContent.style.opacity = '0';
				mainContent.style.transform = 'translateY(16px)';

				setTimeout(() => {
					state.currentSectionIndex--;
					localStorage.setItem(
						`truvoy_survey_${state.currentSurvey}_index`,
						state.currentSectionIndex,
					);

					renderSection(state.currentSectionIndex);

					mainContent.style.opacity = '1';
					mainContent.style.transform = 'translateY(0)';
				}, 300);
			}

			// Submit Survey Responses to Google Sheet via Apps Script Web App
			async function submitSurvey() {
				if (!validateSection()) return;

				const submitBtn = document.querySelector('.btn-primary');
				const originalBtnText = submitBtn.innerHTML;

				// Update UI loading state
				submitBtn.disabled = true;
				submitBtn.innerHTML = `
        Submitting... 
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" class="spinner" style="animation: spin 1s linear infinite; margin-left: 8px; display: inline-block;">
          <circle cx="12" cy="12" r="10" stroke-opacity="0.25"></circle>
          <path d="M4 12a8 8 0 018-8v8H4z" fill="currentColor"></path>
        </svg>
      `;

				// ⚠️ REPLACE THIS WITH YOUR COPIED GOOGLE APPS SCRIPT WEB APP URL
				const SCRIPT_URL =
					'https://script.google.com/macros/s/AKfycbxgsUE3Z4kMwr_72mV34l1NfygDCOD-MYF8x8qmFz68MuNHA4MzPYcBTNuEltCegXuw4g/exec';

				try {
					const payload = {
						surveyType: state.currentSurvey, // 'cafe', 'tour', 'tourist'
						answers: state.answers,
					};

					// We use text/plain content type to bypass CORS precheck restrictions of Apps Script Web Apps
					const response = await fetch(SCRIPT_URL, {
						method: 'POST',
						headers: {
							'Content-Type': 'text/plain;charset=utf-8',
						},
						body: JSON.stringify(payload),
					});

					if (!response.ok) {
						throw new Error(`HTTP error! status: ${response.status}`);
					}

					const result = await response.json();

					if (result.success) {

						// Clear draft local storage states upon successful submission
						localStorage.removeItem(
							`truvoy_survey_${state.currentSurvey}_index`,
						);
						localStorage.removeItem(
							`truvoy_survey_${state.currentSurvey}_answers`,
						);

						// Reset in-memory state
						state.answers = {};
						state.currentSectionIndex = 0;

						// Render the Thank You card
						renderThankYou();
					} else {
						throw new Error(
							result.error || 'Unknown Apps Script processing error.',
						);
					}
				} catch (error) {
					console.error('Submission failed:', error);
					alert(
						'We encountered an issue saving your responses. Please try submitting again.',
					);

					// Reset UI state
					submitBtn.disabled = false;
					submitBtn.innerHTML = originalBtnText;
				}
			}


			// Render confirmation thank-you screen
			function renderThankYou() {
				const container = document.getElementById('app');
				const meta = SURVEY_META[state.currentSurvey];

				container.innerHTML = `
        <div class="thankyou-card">
          <div class="success-icon-wrapper">✓</div>
          <h2 class="thankyou-title">Thank you!</h2>
          <p class="thankyou-text">
            Your responses to the <strong>${meta.title} Survey</strong> have been successfully submitted. We appreciate your valuable time and feedback to help shape TruVoy.
          </p>
          <button class="btn btn-primary" onclick="window.location.href='index.html'">
            Visit Website
          </button>
        </div>
      `;
			}

			// Reset hash to go home
			function navigateHome() {
				window.location.hash = '';
			}

			// ── 6. LOCAL STORAGE MANAGERS ──────────────────────────────────────
			function saveAnswers(type, answers) {
				localStorage.setItem(
					`truvoy_survey_${type}_answers`,
					JSON.stringify(answers),
				);
			}

			function loadAnswers(type) {
				const stored = localStorage.getItem(`truvoy_survey_${type}_answers`);
				return stored ? JSON.parse(stored) : null;
			}

			// Listen to changes in viewport to adapt side panel layouts dynamically
			window.addEventListener('resize', () => {
				if (state.currentSurvey && !state.isSubmitted) {
					// Rerender layout skeleton to fit wide vs narrow desktop viewports
					renderSurvey(state.currentSurvey);
				}
			});

			// ── 7. INITIALIZE ROUTING ──────────────────────────────────────────
			window.addEventListener('hashchange', router);
			document.addEventListener('DOMContentLoaded', router);
		</script>
	</body>
